name: kulipa_pay
description: "KulipaPay - Sistema de Pagamentos"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.1.0
  provider: ^6.0.5
  flutter_secure_storage: ^9.0.0
  qr_flutter: ^4.0.0
  qr_code_scanner: ^1.0.1
  fluttertoast: ^8.2.4
  flutter_launcher_icons: ^0.14.4
  google_fonts: ^6.3.0
  intl: ^0.20.2
  fl_chart: ^0.66.0
  web_socket_channel: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
